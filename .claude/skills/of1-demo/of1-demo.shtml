  .of1-card--pending {

  .of1-card__run {

    transition: all 0.2s ease;

  .of1-card__retry:hover {

  }

  .of1-card--review .of1-card__elapsed {

    background: transparent;
    border: 1px solid rgba(255, 200, 50, 0.25);

    text-decoration: none;
    max-width: 100%;
    overflow: hidden;
    letter-spacing: 0.02em;

  .of1-card__deliverable:hover {

    border-color: rgba(255, 200, 50, 0.5);

  .of1-card__deliverable-text {

    white-space: nowrap;
  }

  .of1-card__deliverable-icon {
    flex-shrink: 0;
    width: 11px;
    height: 11px;
  }

  /* ─── Review Actions ─────────────────────────────────────── */

  .of1-card__actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }

  .of1-card__btn {
    padding: 5px 14px;
    font-size: 9px;
    font-weight: 600;
    font-family: var(--of1-body-font);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    border-radius: var(--of1-radius-pill);
    border: 1px solid;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .of1-card__btn--approve {
    background: var(--of1-teal);
    border-color: var(--of1-teal);
    color: var(--of1-bg);
  }

  .of1-card__btn--approve:hover {
    filter: brightness(1.15);
    box-shadow: 0 0 12px rgba(0, 229, 160, 0.3);

  .of1-card__btn--revise {
    background: transparent;
    border-color: rgba(255, 200, 50, 0.4);

  }

  .of1-card__btn--revise:hover {
    background: rgba(255, 200, 50, 0.1);

  }

  /* ─── Review Summary ─────────────────────────────────────── */

  .of1-card__summary {
    font-size: 10px;
    font-weight: 400;
    color: var(--of1-fg);
    margin-top: 8px;
    padding: 8px 10px;
    background: rgba(255, 200, 50, 0.04);
    border: 1px solid rgba(255, 200, 50, 0.12);
    border-radius: 6px;
    line-height: 1.5;
    white-space: pre-wrap;
  }

  /* ─── Error Detail ──────────────────────────────────────── */

  .of1-card__error {
    font-size: 10px;
    color: var(--of1-failed);
    margin-top: 6px;
    word-break: break-word;
    opacity: 0.9;
  }

  /* ─── Step Description ─────────────────────────────────────── */

  .of1-card__desc {
    font-size: 9px;
    font-weight: 400;
    color: var(--of1-fg-muted);
    margin-top: 3px;
    line-height: 1.4;
    letter-spacing: 0.01em;

  .of1-card--review .of1-card__desc { color: rgba(255, 200, 50, 0.6); }

  /* ─── Flow Connector ──────────────────────────────────────── */

  .of1-connector {
    display: flex;
    justify-content: center;
    height: 16px;
    position: relative;
  }

  .of1-connector::after {
    content: '';
    width: 1px;
    height: 100%;
    background: linear-gradient(to bottom, var(--of1-border), rgba(245, 240, 232, 0.2));
  }

  .of1-connector--done::after {
    background: linear-gradient(to bottom, rgba(0, 229, 160, 0.3), rgba(0, 229, 160, 0.15));
  }

  .of1-connector--active::after {
    background: linear-gradient(to bottom, rgba(255, 61, 0, 0.4), rgba(255, 61, 0, 0.15));
  }

  .of1-connector--fork {
    height: 20px;
  }

  .of1-connector--fork::after {
    width: 0;
    height: 0;
    background: none;
  }

  .of1-connector--fork::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 20%;
    right: 20%;

    { name: 'Templates', skill: 'of1-template-generation', review: true, desc: 'Generate 25 branded templates (5 intents × 5 variations)', reviewNote: 'Template gallery', track: 'A', requires: [5] },
    { name: 'OF1 styling', skill: 'generative-block-styler', review: true, desc: 'Style the generative search UI to match the brand', reviewNote: 'OF1 page', track: 'A', requires: [5] },
    { name: 'Brand & content', skill: 'brand-voice-extractor,content-metadata', review: false, desc: 'Extract brand voice, products, personas, and assets', track: 'B', requires: [4] },
    { name: 'Block guide', skill: 'block-guide-builder', review: false, desc: 'Build block catalog, select blocks for generation', track: 'B', requires: [4] },
    { name: 'Suggestions', skill: 'quick-suggestions', review: false, desc: 'Generate search chips and UI copy for the demo', track: 'B', requires: [4] },
    { name: 'CTA template', skill: 'cta-template-builder', review: false, desc: 'Extract design system, build branded CTA template', track: 'B', requires: [4] },
    { name: 'Config review', skill: 'config-review', review: true, desc: 'Review all config before deploy', reviewNote: 'Config review page', track: 'B', requires: [8, 9, 10, 11] },
    { name: 'Deploy', skill: 'of1-deploy', review: true, desc: 'Deploy to worker, publish demo hub', reviewNote: 'Demo Hub', track: null, requires: [6, 7, 12] }
  ];

  var ICONS = {
    pending: '<svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5" opacity="0.4"/></svg>',
    ready: '<svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M6 8l2 2 2-3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/></svg>',
    active: '<svg class="of1-spinner" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5" opacity="0.2"/><path d="M14 8a6 6 0 0 0-6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>',
    done: '<svg viewBox="0 0 16 16" fill="none"><path d="M4 8.5l2.5 2.5L12 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    review: '<svg viewBox="0 0 16 16" fill="none"><rect x="5" y="4" width="2.5" height="8" rx="1" fill="currentColor"/><rect x="8.5" y="4" width="2.5" height="8" rx="1" fill="currentColor"/></svg>',
    failed: '<svg viewBox="0 0 16 16" fill="none"><path d="M5 5l6 6M11 5l-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>'
  };

  var EXTERNAL_ICON = '<svg class="of1-card__deliverable-icon" viewBox="0 0 16 16" fill="none"><path d="M6 3H3.5a1 1 0 0 0-1 1v8.5a1 1 0 0 0 1 1H12a1 1 0 0 0 1-1V10m-3-7h4m0 0v4m0-4L8 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  var state = { domain: '', steps: [] };
  for (var i = 0; i < STEPS.length; i++) {
    state.steps.push({ status: 'pending', deliverable: null, deliverables: null, summary: null, error: null, startedAt: null, completedAt: null });
  }

  var timerInterval = null;

  function formatElapsed(ms) {
    var seconds = Math.floor(ms / 1000);
    if (seconds < 60) return seconds + 's';
    var minutes = Math.floor(seconds / 60);
    return minutes + 'm ' + (seconds % 60) + 's';
  }

  function truncateUrl(url, max) {
    if (!url || url.length <= max) return url || '';
    return url.substring(0, max - 1) + '\u2026';
  }

  function canRun(idx) {
    if (!state.domain && idx > 0) return false;
    if (idx === 0 && !state.domain) return true; // Install deps can run without domain
    var st = state.steps[idx];
    if (st.status === 'active') return false;

    // Check all required steps are done
    var reqs = STEPS[idx].requires || [];
    for (var i = 0; i < reqs.length; i++) {
      if (state.steps[reqs[i]].status !== 'done') return false;
    }
    return true;
  }

  function render() {
    var domainEl = document.getElementById('of1-domain');
    domainEl.textContent = state.domain || '';

    var inputSection = document.getElementById('of1-domain-input');
    inputSection.className = state.domain ? 'of1-domain-input of1-domain-input--hidden' : 'of1-domain-input';

    var container = document.getElementById('of1-steps');
    var html = '';
    var now = Date.now();

    function renderCard(i) {
      var step = STEPS[i];
      var st = state.steps[i];
      var status = st.status || 'pending';
      var num = (i + 1 < 10 ? '0' : '') + (i + 1);
      var runnable = canRun(i);
      var displayStatus = status;
      if ((status === 'pending' || status === 'failed') && runnable) displayStatus = 'ready';

      var h = '<div class="of1-card of1-card--' + displayStatus + '">';
      h += '<div class="of1-card__icon">' + (ICONS[displayStatus] || ICONS.pending) + '</div>';
      h += '<div class="of1-card__body">';
      h += '<div class="of1-card__row">';
      h += '<div class="of1-card__name"><span class="of1-card__num">' + num + '</span><span>' + step.name + '</span>';
      if (status === 'pending' && step.review) h += ' <span class="of1-badge">review</span>';
      h += '</div>';

      if (status === 'active' && st.startedAt) {
        h += '<span class="of1-card__elapsed">' + formatElapsed(now - st.startedAt) + '</span>';
      } else if ((status === 'done' || status === 'review' || status === 'failed') && st.startedAt && st.completedAt) {
        h += '<span class="of1-card__elapsed">' + formatElapsed(st.completedAt - st.startedAt) + '</span>';
      } else if (runnable && status !== 'active' && status !== 'done' && status !== 'review') {
        h += '<button class="of1-card__run" data-step="' + (i + 1) + '">Run</button>';
      }

      h += '</div>';
      h += '<div class="of1-card__desc">' + step.desc + '</div>';
      if (step.reviewNote && (status === 'pending' || displayStatus === 'ready')) {
        h += '<div class="of1-card__desc" style="color:rgba(255,200,50,0.5);margin-top:2px">Review: ' + step.reviewNote + '</div>';
      }

      if (status === 'failed') {
        if (st.error) h += '<div class="of1-card__error">' + st.error + '</div>';
        if (runnable) h += '<div class="of1-card__actions"><button class="of1-card__retry" data-step="' + (i + 1) + '">Retry</button></div>';
      }

      if (status === 'review') {
        if (st.summary) {
          h += '<div class="of1-card__summary">' + st.summary + '</div>';
        }
        if (st.deliverables && st.deliverables.length) {
          var urls = JSON.stringify(st.deliverables.map(function(d) { return d.url; }));
          h += '<button class="of1-card__deliverable" onclick="window.__of1openAll(' + (i + 1) + ', ' + urls.replace(/"/g, '&quot;') + ')">';
          h += '<span class="of1-card__deliverable-text">' + (step.reviewNote || 'Open all') + '</span>';
          h += EXTERNAL_ICON + '</button>';
        } else if (st.deliverable) {
          h += '<button class="of1-card__deliverable" data-url="' + st.deliverable + '" onclick="window.__of1open(' + (i + 1) + ', this.dataset.url)">';
          h += '<span class="of1-card__deliverable-text">' + (step.reviewNote || truncateUrl(st.deliverable, 35)) + '</span>';
          h += EXTERNAL_ICON + '</button>';
        }
        h += '<div class="of1-card__actions">';
        h += '<button class="of1-card__btn of1-card__btn--approve" onclick="window.__of1action(\'approve\',' + (i + 1) + ')">Approve</button>';
        h += '<button class="of1-card__btn of1-card__btn--revise" onclick="window.__of1action(\'revise\',' + (i + 1) + ')">Revise</button>';
        h += '</div>';
      }

      if (status === 'done') {
        h += '<div class="of1-card__actions"><button class="of1-card__run" data-step="' + (i + 1) + '" style="opacity:0.5;font-size:8px">Re-run</button></div>';
      }

      h += '</div></div>';
      return h;
    }

    // Render steps with two-track parallel layout
    // Steps without a track render linearly; tracks A and B render side-by-side
    var i = 0;

    // Render linear steps before tracks start
    while (i < STEPS.length && !STEPS[i].track) {
      html += renderCard(i);
      if (i + 1 < STEPS.length && !STEPS[i + 1].track) {
        var connClass = 'of1-connector';
        if (state.steps[i].status === 'done') connClass += ' of1-connector--done';
        else if (state.steps[i].status === 'active') connClass += ' of1-connector--active';
        html += '<div class="' + connClass + '"></div>';
      }
      i++;
    }

    // Render parallel tracks
    if (i < STEPS.length && STEPS[i].track) {
      html += '<div class="of1-connector of1-connector--fork"></div>';
      html += '<div class="of1-parallel-label">Parallel tracks<span class="of1-badge of1-badge--parallel">A + B</span></div>';
      html += '<div class="of1-tracks">';

      // Track A
      html += '<div class="of1-track"><div class="of1-track__label">Track A — EDS Site</div>';
      for (var a = i; a < STEPS.length; a++) {
        if (STEPS[a].track === 'A') {
          html += renderCard(a);
        }
      }
      html += '</div>';

      // Track B
      html += '<div class="of1-track"><div class="of1-track__label">Track B — Config</div>';
      html += '<div class="of1-parallel-group">';
      for (var b = i; b < STEPS.length; b++) {
        if (STEPS[b].track === 'B' && b !== 12) { // Config review separate
          html += renderCard(b);
        }
      }
      html += '</div>';
      // Config review (needs the parallel ones above)
      for (var c = i; c < STEPS.length; c++) {
        if (STEPS[c].track === 'B' && c === 12) {
          html += renderCard(c);
        }
      }
      html += '</div>';

      html += '</div>';

      // Skip past all tracked steps
      while (i < STEPS.length && STEPS[i].track) { i++; }
      html += '<div class="of1-connector of1-connector--fork"></div>';
    }

    // Render remaining linear steps (Deploy)
    while (i < STEPS.length) {
      html += renderCard(i);
      if (i + 1 < STEPS.length) {
        var connClass2 = 'of1-connector';
        if (state.steps[i].status === 'done') connClass2 += ' of1-connector--done';
        html += '<div class="' + connClass2 + '"></div>';
      }
      i++;
    }

    container.innerHTML = html;

    // Quick Links
    var QUICKLINKS = [
      { label: 'Repo', step: 2 },
      { label: 'Discovery', step: 3 },
      { label: 'Extraction', step: 4 },
      { label: 'Prototype', step: 5 },
      { label: 'Preview', step: 6 },
      { label: 'Gallery', step: 7 },
      { label: 'OF1 Page', step: 8 },
      { label: 'Config Review', step: 13 },
      { label: 'Demo Hub', step: 14 }
    ];

    var linkIcon = '<svg class="of1-quicklink__icon" viewBox="0 0 16 16" fill="none"><path d="M6 3H3.5a1 1 0 0 0-1 1v8.5a1 1 0 0 0 1 1H12a1 1 0 0 0 1-1V10m-3-7h4m0 0v4m0-4L8 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    var qlHtml = '<div class="of1-quicklinks__title">Quick Links</div><div class="of1-quicklinks__list">';
    for (var q = 0; q < QUICKLINKS.length; q++) {
      var ql = QUICKLINKS[q];
      var idx = ql.step - 1;
      var st = state.steps[idx];
      var hasLink = st.deliverable || (st.deliverables && st.deliverables.length);
      var availClass = hasLink ? ' of1-quicklink--available' : '';
      if (hasLink) {
        var url = st.deliverable || (st.deliverables && st.deliverables[0] && st.deliverables[0].url) || '';
        qlHtml += '<button class="of1-quicklink' + availClass + '" data-step="' + ql.step + '" data-url="' + url + '">' + ql.label + linkIcon + '</button>';
      } else {
        qlHtml += '<span class="of1-quicklink">' + ql.label + linkIcon + '</span>';
      }
    }
    qlHtml += '</div>';
    document.getElementById('of1-quicklinks').innerHTML = qlHtml;
  }

  function startTimer() { stopTimer(); timerInterval = setInterval(render, 1000); }
  function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
  function hasActiveStep() { return state.steps.some(function(s) { return s.status === 'active'; }); }

  function applyUpdate(data) {
    if (data.domain) state.domain = data.domain;
    if (typeof data.step === 'number' && data.step >= 1 && data.step <= STEPS.length) {
      var idx = data.step - 1;
      if (data.status) {
        state.steps[idx].status = data.status;
        if (data.status === 'active') {
          state.steps[idx].startedAt = Date.now();
          state.steps[idx].completedAt = null;
        } else if (data.status === 'done' || data.status === 'review' || data.status === 'failed') {
          if (!state.steps[idx].completedAt) state.steps[idx].completedAt = Date.now();
        }
      }
      if (data.deliverable) state.steps[idx].deliverable = data.deliverable;
      if (data.deliverables) state.steps[idx].deliverables = data.deliverables;
      if (data.summary) state.steps[idx].summary = data.summary;
      if (data.error) state.steps[idx].error = data.error;
    }
    render();
    hasActiveStep() ? startTimer() : stopTimer();
  }

  // Restore state
  var saved = slicc.getState();
  if (saved && saved.steps && saved.steps.length === STEPS.length) {
    state = saved;
    for (var i = 0; i < state.steps.length; i++) {
      if (!('startedAt' in state.steps[i])) state.steps[i].startedAt = null;
      if (!('completedAt' in state.steps[i])) state.steps[i].completedAt = null;
      if (!('summary' in state.steps[i])) state.steps[i].summary = null;
      if (!('deliverable' in state.steps[i])) state.steps[i].deliverable = null;
      if (!('deliverables' in state.steps[i])) state.steps[i].deliverables = null;
    }
  }
  render();
  if (hasActiveStep()) startTimer();

  // Domain input
  document.getElementById('of1-domain-go').addEventListener('click', function () {
    var val = document.getElementById('of1-domain-field').value.trim();
    if (!val) return;
    state.domain = val;
    slicc.setState(state);
    render();
    slicc.lick({ action: 'set-domain:' + val });
  });

  document.getElementById('of1-domain-field').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') document.getElementById('of1-domain-go').click();
  });

  // Reset
  document.getElementById('of1-reset').addEventListener('click', function () {
    state.domain = '';
    for (var i = 0; i < state.steps.length; i++) {
      state.steps[i] = { status: 'pending', deliverable: null, error: null, startedAt: null, completedAt: null };
    }
    stopTimer();
    slicc.setState(state);
    render();
    slicc.lick({ action: 'reset' });
  });

  // Step buttons (run, retry, approve, revise)
  document.getElementById('of1-steps').addEventListener('click', function (e) {
    var runBtn = e.target.closest('.of1-card__run');
    if (runBtn) {
      var step = parseInt(runBtn.getAttribute('data-step'), 10);
      var idx = step - 1;
      state.steps[idx].status = 'active';
      state.steps[idx].startedAt = Date.now();
      state.steps[idx].completedAt = null;
      state.steps[idx].error = null;
      slicc.setState(state);
      render();
      startTimer();
      slicc.lick({ action: 'run:' + step + ':' + STEPS[idx].skill + ':' + (state.domain || '') });
      return;
    }

    var retryBtn = e.target.closest('.of1-card__retry');
    if (retryBtn) {
      var step = parseInt(retryBtn.getAttribute('data-step'), 10);
      var idx = step - 1;
      state.steps[idx].status = 'active';
      state.steps[idx].startedAt = Date.now();
      state.steps[idx].completedAt = null;
      state.steps[idx].error = null;
      slicc.setState(state);
      render();
      startTimer();
      slicc.lick({ action: 'run:' + step + ':' + STEPS[idx].skill + ':' + (state.domain || '') });
      return;
    }

    // handled by window.__of1action now
  });

  // Action handler for approve/revise buttons
  var lastAction = 0;
  window.__of1open = function (step, url) {
    slicc.lick({ action: 'open-deliverable:' + step + ':' + encodeURIComponent(url || '') });
  };

  window.__of1openAll = function (step, urls) {
    slicc.lick({ action: 'open-deliverables:' + step + ':' + encodeURIComponent(JSON.stringify(urls)) });
  };

  window.__of1action = function (action, step) {
    var now = Date.now();
    if (now - lastAction < 1000) return;
    lastAction = now;
    if (action === 'approve') {
      state.steps[step - 1].status = 'done';
      state.steps[step - 1].completedAt = Date.now();
      slicc.setState(state);
      render();
    }
    slicc.lick({ action: action + ':' + step + ':' + (state.domain || '') });
    if (action === 'revise' && slicc.focus) {
      slicc.focus();
    }
  };

  // Quick link clicks
  document.getElementById('of1-quicklinks').addEventListener('click', function (e) {
    var btn = e.target.closest('.of1-quicklink--available');
    if (!btn) return;
    var step = parseInt(btn.getAttribute('data-step'), 10);
    var url = btn.getAttribute('data-url');
    if (url) {
      slicc.lick({ action: 'open-deliverable:' + step + ':' + encodeURIComponent(url) });
    }
  });

  // Updates from cone
  slicc.on('update', function (data) {
    applyUpdate(data);
    slicc.setState(state);
  });
})();
</script>
